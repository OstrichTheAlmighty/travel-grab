<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!--
    TravelGrab mark: 270° arc (flight path) + map pin (destination)
    Single accent color: #8FF7D0 (lantern-mint)
    Dark body: #070A12 (ink)
    No gradients, no glow filters — intentional flat design
  -->

  <!-- Arc: 270° from 3-o'clock to 12-o'clock, counter-clockwise -->
  <!-- Circle center (40,28) radius 20                             -->
  <!-- Start (60,28) → End (40,8)  large-arc=1 sweep=0            -->
  <path
    d="M 60,28 A 20,20 0 1,0 40,8"
    stroke="#8FF7D0"
    stroke-width="5.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Airplane silhouette in the NE gap (~45° between 12 and 3)  -->
  <!-- Positioned at (54,14), rotated 45° so nose points northeast -->
  <!-- Mint fill so it reads against the dark (#070A12) background -->
  <g transform="translate(54,14) rotate(45)">
    <rect x="-1.8" y="-6" width="3.6" height="11" rx="1.8" fill="#8FF7D0"/>
    <path d="M -1.8,-1 L -7.5,4.5 L -1.8,2.5 Z"  fill="#8FF7D0"/>
    <path d="M  1.8,-1 L  7.5,4.5 L  1.8,2.5 Z"  fill="#8FF7D0"/>
    <path d="M -1.5,4 L -4.5,8 L -1.5,5.5 Z"     fill="#8FF7D0"/>
    <path d="M  1.5,4 L  4.5,8 L  1.5,5.5 Z"     fill="#8FF7D0"/>
  </g>

  <!-- Map pin: centered x=40, top y=44, tip y=73               -->
  <path
    d="M40,44 C33,44 28,49.5 28,56 C28,64 40,73 40,73
       C40,73 52,64 52,56 C52,49.5 47,44 40,44 Z"
    fill="#8FF7D0"
  />
  <!-- Cutout circle creates a hollow ring inside the pin        -->
  <circle cx="40" cy="55" r="4.5" fill="#070A12"/>
</svg>
